<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>
    <noscript>
        <p style="padding:2rem;text-align:center;font-family:sans-serif;">
            JavaScript est requis pour utiliser BRVM Gestion.
        </p>
    </noscript>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        // ----- Clés de stockage de l'application fusionnée -----
        const KEYS = {
            transactions: 'brvm_fusion_transactions',
            marketPrices: 'brvm_fusion_market_prices',
            horizons: 'brvm_fusion_horizons',
            targets: 'brvm_fusion_targets',
            strategies: 'brvm_fusion_strategies'
        };

        // Migration : récupère les données des deux anciennes applications
        // (long.html -> brvm_lt_*, Speculation.html -> brvm_spec_*) si l'app
        // fusionnée n'a encore aucune donnée.
        function safeParse(raw, fallback) {
            try { return raw ? JSON.parse(raw) : fallback; }
            catch (e) { console.warn('Données localStorage invalides, réinitialisation.', e); return fallback; }
        }

        function migrateOldData() {
            if (localStorage.getItem(KEYS.transactions)) return null;

            const ltTx = safeParse(localStorage.getItem('brvm_lt_transactions'), []);
            const specTx = safeParse(localStorage.getItem('brvm_spec_transactions'), []);
            if (ltTx.length === 0 && specTx.length === 0) return null;

            const tagged = [
                ...specTx.map(t => ({ ...t, id: 'spec_' + t.id, poche: 'SPEC' })),
                ...ltTx.map(t => ({ ...t, id: 'lt_' + t.id, poche: 'LT' }))
            ].sort((a, b) => (a.date < b.date ? 1 : -1));

            const ltPrices = safeParse(localStorage.getItem('brvm_lt_market_prices'), {});
            const specPrices = safeParse(localStorage.getItem('brvm_spec_market_prices'), {});
            const horizons = safeParse(localStorage.getItem('brvm_lt_horizons'), {});

            const strategies = {};
            specTx.forEach(t => { if (t.quantite) strategies[t.libelle] = 'SPEC'; });
            ltTx.forEach(t => { if (t.quantite) strategies[t.libelle] = 'LT'; });

            return {
                transactions: tagged,
                marketPrices: { ...ltPrices, ...specPrices },
                horizons,
                strategies
            };
        }

        const MIGRATED = migrateOldData();

        function loadState(key, fallback) {
            return safeParse(localStorage.getItem(key), fallback);
        }

        const FRAIS_TAUX_DEFAUT = 0.0122;

        function calcFraisOperation(type, qty, price, fraisManuelsStr) {
            const q = parseInt(qty);
            const p = parseFloat(price);
            if (isNaN(q) || q <= 0 || isNaN(p) || p <= 0) return null;
            const totalBrut = q * p;
            const fraisSaisi = fraisManuelsStr !== '' && fraisManuelsStr != null && !isNaN(parseFloat(fraisManuelsStr));
            const frais = fraisSaisi ? parseFloat(fraisManuelsStr) : Math.round(totalBrut * FRAIS_TAUX_DEFAUT);
            const pct = totalBrut > 0 ? (frais / totalBrut) * 100 : 0;
            const totalNet = type === 'ACHAT' ? totalBrut + frais : totalBrut - frais;
            return { totalBrut, frais, pct, totalNet, estime: !fraisSaisi };
        }

        function getTxFrais(t) {
            if (t.type !== 'ACHAT' && t.type !== 'VENTE') return null;
            const brut = t.montantBrut || (t.quantite * t.cours);
            if (t.frais != null) return { brut, frais: t.frais, pct: t.fraisPct != null ? t.fraisPct : (brut > 0 ? (t.frais / brut) * 100 : 0) };
            const frais = t.type === 'ACHAT' ? t.debit - brut : brut - t.credit;
            return { brut, frais: Math.max(0, frais), pct: brut > 0 ? (Math.max(0, frais) / brut) * 100 : 0 };
        }

        // Corrige symboles, montants bruts et frais sur les anciennes opérations achat/vente.
        function normalizeTransaction(t) {
            if (t.type === 'DIVIDENDE') {
                const libelle = (t.libelle || '').toUpperCase().trim();
                return libelle === t.libelle ? t : { ...t, libelle };
            }
            if (t.type !== 'ACHAT' && t.type !== 'VENTE') return t;

            const libelle = (t.libelle || '').toUpperCase().trim();
            const qty = t.quantite;
            const price = t.cours;
            if (!libelle || !qty || !price) return { ...t, libelle };

            const totalBrut = t.montantBrut != null ? t.montantBrut : qty * price;
            let frais = t.frais;

            if (frais == null) {
                if (t.type === 'ACHAT' && t.debit > totalBrut) frais = t.debit - totalBrut;
                else if (t.type === 'VENTE' && t.credit > 0 && t.credit < totalBrut) frais = totalBrut - t.credit;
                else frais = Math.round(totalBrut * FRAIS_TAUX_DEFAUT);
            }
            frais = Math.max(0, Math.round(frais));
            const fraisPct = totalBrut > 0 ? (frais / totalBrut) * 100 : 0;
            const debit = t.type === 'ACHAT' ? totalBrut + frais : 0;
            const credit = t.type === 'VENTE' ? totalBrut - frais : (t.credit || 0);

            return {
                ...t,
                libelle,
                montantBrut: totalBrut,
                frais,
                fraisPct,
                debit: t.type === 'ACHAT' ? debit : (t.debit || 0),
                credit: t.type === 'VENTE' ? credit : (t.credit || 0)
            };
        }

        function previewGainVente(positions, symbole, qtyStr, priceStr, fraisManuelsStr) {
            const sym = (symbole || '').toUpperCase().trim();
            const q = parseInt(qtyStr);
            const p = parseFloat(priceStr);
            if (!sym || isNaN(q) || q <= 0 || isNaN(p) || p <= 0) return null;
            const pos = positions.find(item => item.symbole === sym);
            if (!pos) return { error: 'no_position' };
            const fraisOp = calcFraisOperation('VENTE', q, p, fraisManuelsStr);
            if (!fraisOp) return null;
            const coutRevient = pos.pru * q;
            const gainRealise = fraisOp.totalNet - coutRevient;
            return {
                ...fraisOp,
                pru: pos.pru,
                coutRevient,
                gainRealise,
                perfPct: coutRevient > 0 ? (gainRealise / coutRevient) * 100 : 0
            };
        }

        function computeVenteGains(list) {
            const gainsById = {};
            let totalGainRealise = 0;
            const map = {};

            sortTransactionsChrono(list).forEach(t => {
                if (t.type === 'ACHAT') {
                    const sym = (t.libelle || '').toUpperCase().trim();
                    if (!sym || !t.quantite) return;
                    if (!map[sym]) map[sym] = { quantite: 0, coutTotal: 0 };
                    map[sym].quantite += t.quantite;
                    map[sym].coutTotal += t.debit;
                } else if (t.type === 'VENTE') {
                    const sym = (t.libelle || '').toUpperCase().trim();
                    if (!sym || !t.quantite || !map[sym] || map[sym].quantite <= 0) return;
                    const qteVendue = Math.min(t.quantite, map[sym].quantite);
                    const pruVente = map[sym].coutTotal / map[sym].quantite;
                    const coutRevient = pruVente * qteVendue;
                    const normalized = normalizeTransaction(t);
                    const produitNet = normalized.credit;
                    const gainRealise = produitNet - coutRevient;

                    gainsById[t.id] = {
                        qteVendue,
                        pruVente,
                        coutRevient,
                        produitNet,
                        gainRealise,
                        perfPct: coutRevient > 0 ? (gainRealise / coutRevient) * 100 : 0
                    };
                    totalGainRealise += gainRealise;

                    const ratio = qteVendue / map[sym].quantite;
                    map[sym].coutTotal -= map[sym].coutTotal * ratio;
                    map[sym].quantite -= qteVendue;
                }
            });

            return { gainsById, totalGainRealise };
        }

        // Les transactions sont stockées du plus récent au plus ancien — il faut les
        // rejouer dans l'ordre chronologique pour calculer correctement le portefeuille.
        function sortTransactionsChrono(list) {
            return [...list].sort((a, b) => {
                const d = a.date.localeCompare(b.date);
                if (d !== 0) return d;
                return String(a.id).localeCompare(String(b.id));
            });
        }

        function computePositions(list, prices, strat) {
            const map = {};
            sortTransactionsChrono(list).forEach(t => {
                if (t.type === "ACHAT") {
                    const sym = (t.libelle || '').toUpperCase().trim();
                    if (!sym || !t.quantite) return;
                    if (!map[sym]) map[sym] = { quantite: 0, coutTotal: 0 };
                    map[sym].quantite += t.quantite;
                    map[sym].coutTotal += t.debit;
                } else if (t.type === "VENTE") {
                    const sym = (t.libelle || '').toUpperCase().trim();
                    if (!sym || !t.quantite || !map[sym] || map[sym].quantite <= 0) return;
                    const qteVendue = Math.min(t.quantite, map[sym].quantite);
                    const ratio = qteVendue / map[sym].quantite;
                    map[sym].coutTotal -= map[sym].coutTotal * ratio;
                    map[sym].quantite -= qteVendue;
                }
            });

            const actives = [];
            Object.keys(map).forEach(key => {
                if (map[key].quantite > 0) {
                    const pru = map[key].coutTotal / map[key].quantite;
                    const coursActuel = prices[key] || pru;
                    const valeurActuelle = map[key].quantite * coursActuel;
                    const plusValue = valeurActuelle - map[key].coutTotal;
                    actives.push({
                        symbole: key,
                        strategie: strat[key] || 'SPEC',
                        quantite: map[key].quantite,
                        coutTotal: map[key].coutTotal,
                        pru,
                        coursActuel,
                        valeurActuelle,
                        plusValue,
                        performance: map[key].coutTotal > 0 ? (plusValue / map[key].coutTotal) * 100 : 0
                    });
                }
            });
            return actives;
        }

        function getQuantiteDetenue(list, symbole, excludeId) {
            const map = {};
            sortTransactionsChrono(list).forEach(t => {
                if (excludeId && t.id === excludeId) return;
                if (t.type === "ACHAT") {
                    const sym = (t.libelle || '').toUpperCase().trim();
                    if (sym !== symbole) return;
                    map[sym] = (map[sym] || 0) + t.quantite;
                } else if (t.type === "VENTE") {
                    const sym = (t.libelle || '').toUpperCase().trim();
                    if (sym !== symbole) return;
                    map[sym] = (map[sym] || 0) - t.quantite;
                }
            });
            return Math.max(0, map[symbole] || 0);
        }

        function App() {
            const [transactions, setTransactions] = useState(() =>
                (loadState(KEYS.transactions, MIGRATED ? MIGRATED.transactions : [])).map(normalizeTransaction)
            );

            // Migration unique : recalcule frais/crédits sur les anciennes ventes sans frais.
            useEffect(() => {
                setTransactions(prev => {
                    const next = prev.map(normalizeTransaction);
                    return JSON.stringify(next) === JSON.stringify(prev) ? prev : next;
                });
            }, []);
            const [marketPrices, setMarketPrices] = useState(() =>
                loadState(KEYS.marketPrices, MIGRATED ? MIGRATED.marketPrices : {})
            );
            const [horizons, setHorizons] = useState(() =>
                loadState(KEYS.horizons, MIGRATED ? MIGRATED.horizons : {})
            );
            const [targets, setTargets] = useState(() => loadState(KEYS.targets, {}));
            const [strategies, setStrategies] = useState(() =>
                loadState(KEYS.strategies, MIGRATED ? MIGRATED.strategies : {})
            );

            useEffect(() => {
                const timer = setTimeout(() => {
                    try {
                        localStorage.setItem(KEYS.transactions, JSON.stringify(transactions));
                        localStorage.setItem(KEYS.marketPrices, JSON.stringify(marketPrices));
                        localStorage.setItem(KEYS.horizons, JSON.stringify(horizons));
                        localStorage.setItem(KEYS.targets, JSON.stringify(targets));
                        localStorage.setItem(KEYS.strategies, JSON.stringify(strategies));
                    } catch (e) {
                        console.warn('Sauvegarde locale impossible', e);
                    }
                }, 400);
                return () => clearTimeout(timer);
            }, [transactions, marketPrices, horizons, targets, strategies]);

            // États de navigation et de formulaire
            const [activeTab, setActiveTab] = useState("dashboard"); // dashboard, transactions, strategie
            const [formType, setFormType] = useState("ACHAT");
            const [formPoche, setFormPoche] = useState("SPEC"); // SPEC ou LT
            const [ticker, setTicker] = useState("");
            const [quantite, setQuantite] = useState("");
            const [cours, setCours] = useState("");
            const [dateOp, setDateOp] = useState(new Date().toISOString().split('T')[0]);
            const [fluxMontant, setFluxMontant] = useState("");
            const [fraisManuels, setFraisManuels] = useState("");
            const [filtrePoche, setFiltrePoche] = useState("TOUS"); // TOUS, SPEC, LT
            const [priceDrafts, setPriceDrafts] = useState({});
            const [editingTxId, setEditingTxId] = useState(null);
            const [editForm, setEditForm] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [installPrompt, setInstallPrompt] = useState(null);
            const [canInstall, setCanInstall] = useState(false);
            const [showInstallGuide, setShowInstallGuide] = useState(false);
            const [isInstalled, setIsInstalled] = useState(
                () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true
            );

            const installGuide = useMemo(() => {
                const ua = navigator.userAgent;
                const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                const isAndroid = /Android/.test(ua);

                if (location.protocol === 'file:') {
                    return {
                        title: 'Étape requise avant l\'installation',
                        steps: [
                            'Fermez cette page ouverte directement depuis le dossier.',
                            'Double-cliquez sur demarrer.bat dans le dossier modi.',
                            'Une fois la page ouverte dans Chrome (adresse http://...), revenez ici et touchez « Ajouter à l\'écran d\'accueil ».'
                        ]
                    };
                }
                if (isIOS) {
                    return {
                        title: 'iPhone / iPad (Safari ou Chrome)',
                        steps: [
                            'Appuyez sur le bouton Partager (carré avec une flèche vers le haut).',
                            'Faites défiler et choisissez « Sur l\'écran d\'accueil ».',
                            'Appuyez sur « Ajouter » en haut à droite.'
                        ]
                    };
                }
                if (isAndroid) {
                    return {
                        title: 'Android (Chrome)',
                        steps: [
                            'Appuyez sur le menu ⋮ en haut à droite du navigateur.',
                            'Choisissez « Installer l\'application » ou « Ajouter à l\'écran d\'accueil ».',
                            'Confirmez — l\'icône BRVM apparaîtra sur votre écran d\'accueil.'
                        ]
                    };
                }
                return {
                    title: 'Ordinateur (Chrome / Edge)',
                    steps: [
                        'Cliquez sur l\'icône d\'installation (⊕ ou petit écran) dans la barre d\'adresse.',
                        'Ou ouvrez le menu ⋮ → « Installer BRVM Gestion... ».',
                        'L\'application sera ajoutée au bureau ou au menu Démarrer.'
                    ]
                };
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }, 80);
                return () => clearTimeout(timer);
            }, [activeTab, showInstallGuide, editingTxId]);

            // Capture l'événement d'installation PWA proposé par Chrome
            useEffect(() => {
                const onBeforeInstall = (e) => {
                    e.preventDefault();
                    setInstallPrompt(e);
                    setCanInstall(true);
                };
                const onInstalled = () => {
                    setCanInstall(false);
                    setInstallPrompt(null);
                    setIsInstalled(true);
                };
                window.addEventListener('beforeinstallprompt', onBeforeInstall);
                window.addEventListener('appinstalled', onInstalled);
                return () => {
                    window.removeEventListener('beforeinstallprompt', onBeforeInstall);
                    window.removeEventListener('appinstalled', onInstalled);
                };
            }, []);

            const handleInstallApp = async () => {
                if (installPrompt) {
                    installPrompt.prompt();
                    const { outcome } = await installPrompt.userChoice;
                    setShowInstallGuide(false);
                    if (outcome === 'accepted') {
                        setCanInstall(false);
                        setIsInstalled(true);
                    }
                    setInstallPrompt(null);
                    return;
                }
                setShowInstallGuide(true);
            };

            const formatFCFA = (val) =>
                new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'XOF', minimumFractionDigits: 0 }).format(val).replace('XOF', 'FCFA');

            const calcCash = (txList, excludeId) => {
                let solde = 0;
                txList.forEach(t => {
                    if (excludeId && t.id === excludeId) return;
                    if (t.type === "DEPOT") solde += t.credit;
                    else if (t.type === "RETRAIT") solde -= t.debit;
                    else if (t.type === "ACHAT") solde -= t.debit;
                    else if (t.type === "VENTE") solde += t.credit;
                    else if (t.type === "DIVIDENDE") solde += t.credit;
                });
                return solde;
            };

            const buildTx = (type, data) => {
                if (type === "DEPOT" || type === "RETRAIT") {
                    const mt = parseFloat(data.fluxMontant);
                    if (isNaN(mt) || mt <= 0) return null;
                    return {
                        date: data.dateOp,
                        type,
                        libelle: type === "DEPOT" ? "Apport de capital" : "Retrait de fonds",
                        montant: mt,
                        debit: type === "RETRAIT" ? mt : 0,
                        credit: type === "DEPOT" ? mt : 0
                    };
                }
                if (type === "DIVIDENDE") {
                    const sym = data.ticker.toUpperCase().trim();
                    if (!sym) return null;
                    const qty = parseInt(data.quantite);
                    const divPerShare = parseFloat(data.cours);
                    let mt = parseFloat(data.fluxMontant);
                    if (isNaN(mt) || mt <= 0) {
                        if (isNaN(qty) || qty <= 0 || isNaN(divPerShare) || divPerShare <= 0) return null;
                        mt = Math.round(qty * divPerShare);
                    }
                    return {
                        date: data.dateOp,
                        type: "DIVIDENDE",
                        libelle: sym,
                        quantite: !isNaN(qty) && qty > 0 ? qty : undefined,
                        cours: !isNaN(divPerShare) && divPerShare > 0 ? divPerShare : undefined,
                        montant: mt,
                        credit: mt,
                        debit: 0
                    };
                }
                const qty = parseInt(data.quantite);
                const price = parseFloat(data.cours);
                const sym = data.ticker.toUpperCase().trim();
                if (!sym || isNaN(qty) || qty <= 0 || isNaN(price) || price <= 0) return null;
                const totalBrut = qty * price;
                const fraisSaisi = data.fraisManuels !== '' && data.fraisManuels != null && !isNaN(parseFloat(data.fraisManuels));
                const frais = fraisSaisi ? parseFloat(data.fraisManuels) : Math.round(totalBrut * FRAIS_TAUX_DEFAUT);
                const fraisPct = totalBrut > 0 ? (frais / totalBrut) * 100 : 0;
                let debit = 0, credit = 0;
                if (type === "ACHAT") debit = totalBrut + frais;
                else credit = totalBrut - frais;
                return {
                    date: data.dateOp,
                    type,
                    libelle: sym,
                    poche: data.poche || 'SPEC',
                    quantite: qty,
                    cours: price,
                    montantBrut: totalBrut,
                    frais,
                    fraisPct,
                    debit,
                    credit
                };
            };

            const cashDisponible = useMemo(() => calcCash(transactions.map(normalizeTransaction)), [transactions]);

            // Positions consolidées (PRU frais inclus), ordre chronologique respecté
            const positions = useMemo(
                () => computePositions(transactions.map(normalizeTransaction), marketPrices, strategies),
                [transactions, marketPrices, strategies]
            );

            const dividendesStats = useMemo(() => {
                const parAction = {};
                let total = 0;
                transactions.forEach(t => {
                    if (t.type === "DIVIDENDE") {
                        const sym = (t.libelle || '').toUpperCase().trim();
                        if (!sym) return;
                        total += t.credit || 0;
                        parAction[sym] = (parAction[sym] || 0) + (t.credit || 0);
                    }
                });
                return { total, parAction };
            }, [transactions]);

            const positionsFiltrees = useMemo(() => {
                const bySym = {};
                positions.forEach(p => { bySym[p.symbole] = { ...p, vendu: false }; });
                Object.keys(dividendesStats.parAction).forEach(sym => {
                    if (!bySym[sym]) {
                        bySym[sym] = {
                            symbole: sym,
                            strategie: strategies[sym] || 'SPEC',
                            quantite: 0,
                            coutTotal: 0,
                            pru: 0,
                            coursActuel: marketPrices[sym] || 0,
                            valeurActuelle: 0,
                            plusValue: 0,
                            performance: 0,
                            vendu: true
                        };
                    }
                });
                const all = Object.values(bySym);
                return filtrePoche === "TOUS" ? all : all.filter(p => p.strategie === filtrePoche && !p.vendu);
            }, [positions, filtrePoche, dividendesStats.parAction, strategies, marketPrices]);

            const venteStats = useMemo(
                () => computeVenteGains(transactions.map(normalizeTransaction)),
                [transactions]
            );

            // Indicateurs globaux
            const valeurTotale = useMemo(() =>
                positions.reduce((acc, p) => acc + p.valeurActuelle, 0) + cashDisponible,
            [positions, cashDisponible]);

            const capitalNet = useMemo(() => transactions.reduce((acc, t) => {
                if (t.type === "DEPOT") return acc + t.credit;
                if (t.type === "RETRAIT") return acc - t.debit;
                return acc;
            }, 0), [transactions]);

            const gainGlobal = valeurTotale - capitalNet;
            const perfGlobale = capitalNet > 0 ? (gainGlobal / capitalNet) * 100 : 0;

            const totalLatent = positions.reduce((acc, p) => acc + p.plusValue, 0);
            const totalCout = positions.reduce((acc, p) => acc + p.coutTotal, 0);
            const latentPct = totalCout > 0 ? (totalLatent / totalCout) * 100 : 0;

            // Valeur par poche pour la répartition
            const valeurParPoche = useMemo(() => {
                const res = { SPEC: 0, LT: 0 };
                positions.forEach(p => { res[p.strategie] += p.valeurActuelle; });
                return res;
            }, [positions]);

            const fraisStats = useMemo(() => {
                let totalFrais = 0;
                let volumeBrut = 0;
                transactions.forEach(t => {
                    const info = getTxFrais(normalizeTransaction(t));
                    if (info) {
                        totalFrais += info.frais;
                        volumeBrut += info.brut;
                    }
                });
                return {
                    totalFrais,
                    volumeBrut,
                    pctMoyen: volumeBrut > 0 ? (totalFrais / volumeBrut) * 100 : 0,
                    nbOperations: transactions.filter(t => t.type === 'ACHAT' || t.type === 'VENTE').length
                };
            }, [transactions]);

            const apercuFraisForm = useMemo(() => {
                if (formType !== 'ACHAT' && formType !== 'VENTE') return null;
                return calcFraisOperation(formType, quantite, cours, fraisManuels);

            const apercuGainVenteForm = useMemo(() => {
                if (formType !== 'VENTE') return null;
                return previewGainVente(positions, ticker, quantite, cours, fraisManuels);

            const apercuFraisEdit = useMemo(() => {
                if (!editForm || (editForm.type !== 'ACHAT' && editForm.type !== 'VENTE')) return null;
                return calcFraisOperation(editForm.type, editForm.quantite, editForm.cours, editForm.fraisManuels);
            }, [editForm]);

            const fillDividendeQuantite = () => {
                const sym = ticker.toUpperCase().trim();
                if (!sym) return;
                const pos = positions.find(p => p.symbole === sym);
                if (pos) setQuantite(String(pos.quantite));
            };

            const handleAddTransaction = (e) => {
                e.preventDefault();
                setIsSaving(true);
                const built = buildTx(formType, { fluxMontant, dateOp, quantite, cours, ticker, fraisManuels, poche: formPoche });
                if (!built) { setIsSaving(false); return; }

                if (formType === "ACHAT") {
                    if (built.debit > cashDisponible) {
                        alert("Trésorerie insuffisante pour exécuter cet achat !");
                        setIsSaving(false);
                        return;
                    }
                    if (!marketPrices[built.libelle]) {
                        setMarketPrices(prev => ({ ...prev, [built.libelle]: built.cours }));
                    }
                    if (!strategies[built.libelle]) {
                        setStrategies(prev => ({ ...prev, [built.libelle]: formPoche }));
                    }
                    if (formPoche === "LT" && !horizons[built.libelle]) {
                        setHorizons(prev => ({ ...prev, [built.libelle]: new Date().getFullYear() + 5 }));
                    }
                }

                if (formType === "VENTE") {
                    const detenu = getQuantiteDetenue(transactions, built.libelle);
                    if (built.quantite > detenu) {
                        alert(`Impossible de vendre ${built.quantite} ${built.libelle} : vous n'en détenez que ${detenu}.`);
                        setIsSaving(false);
                        return;
                    }
                }

                setTransactions(prev => [{ id: Date.now().toString(), ...normalizeTransaction(built) }, ...prev]);
                setFluxMontant(""); setTicker(""); setQuantite(""); setCours(""); setFraisManuels("");
                setTimeout(() => setIsSaving(false), 150);
            };

            const handleDeleteTransaction = (id) => {
                if (confirm("Voulez-vous vraiment supprimer cette ligne de transaction ?")) {
                    setTransactions(prev => prev.filter(t => t.id !== id));
                }
            };

            const handleOpenEdit = (t) => {
                setEditingTxId(t.id);
                setEditForm({
                    type: t.type,
                    dateOp: t.date,
                    fluxMontant: (t.type === 'DEPOT' || t.type === 'RETRAIT' || t.type === 'DIVIDENDE') ? String(t.credit || t.debit || t.montant || '') : '',
                    ticker: (t.type === 'ACHAT' || t.type === 'VENTE' || t.type === 'DIVIDENDE') ? t.libelle : '',
                    quantite: t.quantite ? String(t.quantite) : '',
                    cours: t.cours ? String(t.cours) : '',
                    fraisManuels: t.frais != null ? String(t.frais) : '',

            const handleSaveEdit = (e) => {
                e.preventDefault();
                if (!editingTxId || !editForm) return;
                const built = buildTx(editForm.type, editForm);
                if (!built) return;

                if (editForm.type === "ACHAT") {

                    setStrategies(prev => ({ ...prev, [built.libelle]: editForm.poche || prev[built.libelle] || 'SPEC' }));

                if (editForm.type === "VENTE") {
                    const detenu = getQuantiteDetenue(transactions, built.libelle, editingTxId);
                    if (built.quantite > detenu) {
                        alert(`Impossible de vendre ${built.quantite} ${built.libelle} : vous n'en détenez que ${detenu}.`);
                        return;
                    }

                setTransactions(prev => prev.map(t => t.id === editingTxId ? normalizeTransaction({ ...built, id: t.id }) : t));
                setEditingTxId(null);
                setEditForm(null);

                const p = parseFloat(raw);
                if (!isNaN(p)) setMarketPrices(prev => ({ ...prev, [sym]: p }));
                setPriceDrafts(prev => {
                    const next = { ...prev };
                    delete next[sym];
                    return next;
                });
            };

            const handleUpdateHorizon = (sym, val) => setHorizons({ ...horizons, [sym]: val });

            const handleUpdateTargets = (sym, field, value) => {
                const val = parseFloat(value);
                setTargets({
                    ...targets,
                    [sym]: { ...(targets[sym] || { stopLoss: 0, takeProfit: 0 }), [field]: isNaN(val) ? 0 : val }

            const handleToggleStrategie = (sym) => {
                const next = (strategies[sym] || 'SPEC') === 'SPEC' ? 'LT' : 'SPEC';
                setStrategies({ ...strategies, [sym]: next });

            const handleResetAll = () => {
                if (confirm("Voulez-vous effacer l'intégralité des données (transactions, cours, objectifs) ?")) {

            const BadgeStrategie = ({ strategie, onClick }) => (

                    {/* VUE : TABLEAU DE BORD */}

                                        {gainGlobal >= 0 ? '+' : ''}{formatFCFA(gainGlobal)} ({gainGlobal >= 0 ? '+' : ''}{perfGlobale.toFixed(2)}%)

                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-500 mb-1">Montant net reçu (FCFA)</label>
                                                <input type="number" value={editForm.fluxMontant} onChange={(e) => setEditForm({ ...editForm, fluxMontant: e.target.value })} placeholder="Ou calcul auto Qté × Div/action" className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg font-bold" />
                                            </div>
                                        </>
                                    ) : (
                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-500 mb-1">Montant (FCFA)</label>
                                            <input type="number" value={editForm.fluxMontant} onChange={(e) => setEditForm({ ...editForm, fluxMontant: e.target.value })} className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg font-bold" required />
                                        </div>
                                    )}
                                    <button type="submit" className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-lg mt-2">
                                        Enregistrer les modifications
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* VUE : OBJECTIFS & STRATÉGIE */}
                    {activeTab === "strategie" && (
                        <div className="space-y-6">

                            {/* Bannière explicative */}
                            <div className="bg-gradient-to-r from-indigo-900 to-slate-900 text-white p-6 rounded-xl shadow-md relative overflow-hidden">
                                <div className="z-10 relative max-w-3xl">
                                    <h2 className="text-xl font-bold mb-2 flex items-center gap-2">
                                        <i data-lucide="shield-check" className="text-indigo-300"></i> Planificateur de Stratégie
                                    </h2>
                                    <p className="text-sm text-indigo-100 leading-relaxed">
                                        Pour vos positions <strong>spéculatives</strong>, fixez un <strong>Stop Loss</strong> (limiter la perte) et un <strong>Take Profit</strong> (empocher vos gains) <strong>avant</strong> l'achat.
                                        Pour vos positions <strong>long terme</strong>, définissez un <strong>horizon cible</strong> (année de revente envisagée) et laissez la croissance composer.
                                    </p>
                                </div>
                                <div className="absolute right-4 bottom-4 opacity-10 hidden md:block">
                                    <i data-lucide="target" className="w-40 h-40"></i>
                                </div>
                            </div>

                            {positions.length === 0 ? (
                                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-12 text-center text-slate-400">
                                    <p className="text-sm">Vous n'avez pas de positions ouvertes à analyser.</p>
                                    <p className="text-xs text-slate-400 mt-1">Achetez d'abord des actions pour configurer vos plans.</p>
                                </div>
                            ) : (
                                <>
                                    {/* Positions spéculatives */}
                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="p-5 border-b border-slate-100">
                                            <h3 className="text-base font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="zap" className="text-indigo-600 w-5 h-5"></i> Poche Spéculation — Stop Loss & Take Profit
                                            </h3>
                                            <p className="text-xs text-slate-500">Configurez vos alertes spéculatives pour maîtriser vos sorties de position.</p>
                                        </div>

                                        {positions.filter(p => p.strategie === 'SPEC').length === 0 ? (
                                            <div className="p-8 text-center text-slate-400 text-sm">Aucune position classée en Spéculation.</div>
                                        ) : (
                                            <div className="p-5 space-y-6">
                                                {positions.filter(p => p.strategie === 'SPEC').map(pos => {
                                                    const tgt = targets[pos.symbole] || { stopLoss: 0, takeProfit: 0 };
                                                    const gainPotentiel = (tgt.takeProfit - pos.pru) * pos.quantite;
                                                    const pertePotentielle = (pos.pru - tgt.stopLoss) * pos.quantite;
                                                    const ratioRR = pertePotentielle > 0 ? (gainPotentiel / pertePotentielle).toFixed(1) : "N/A";
                                                    const slFranchi = pos.coursActuel <= tgt.stopLoss && tgt.stopLoss > 0;
                                                    const tpFranchi = pos.coursActuel >= tgt.takeProfit && tgt.takeProfit > 0;

                                                    return (
                                                        <div key={pos.symbole} className={`p-4 rounded-xl border transition-all ${slFranchi ? 'border-rose-400 bg-rose-50/10' : tpFranchi ? 'border-emerald-400 bg-emerald-50/10' : 'border-slate-200'}`}>
                                                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                                                <div>
                                                                    <div className="flex items-center gap-2">
                                                                        <h4 className="text-lg font-black text-slate-900">{pos.symbole}</h4>
                                                                        <span className="text-xs text-slate-500 font-medium">({pos.quantite} actions détenues)</span>
                                                                    </div>
                                                                    <p className="text-xs text-slate-400 mt-1">Prix moyen d'achat : <strong className="text-slate-700">{formatFCFA(pos.pru)}</strong> (cours actuel : {formatFCFA(pos.coursActuel)})</p>
                                                                </div>
                                                                <div className="flex flex-wrap gap-3">
                                                                    <div>
                                                                        <label className="block text-[11px] font-bold text-rose-600 mb-1 uppercase">Stop Loss (Sécurité)</label>
                                                                        <div className="relative">
                                                                            <input
                                                                                type="number"
                                                                                value={tgt.stopLoss || ""}
                                                                                onChange={(e) => handleUpdateTargets(pos.symbole, "stopLoss", e.target.value)}
                                                                                placeholder="ex: 1900"
                                                                                className="w-28 pl-2 pr-8 py-1.5 text-xs font-bold border border-rose-200 rounded-lg focus:outline-none focus:border-rose-600"
                                                                            />
                                                                            <span className="absolute right-2.5 top-2 text-[9px] text-rose-400 font-bold">XOF</span>
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <label className="block text-[11px] font-bold text-emerald-600 mb-1 uppercase">Take Profit (Cible)</label>
                                                                        <div className="relative">
                                                                            <input
                                                                                type="number"
                                                                                value={tgt.takeProfit || ""}
                                                                                onChange={(e) => handleUpdateTargets(pos.symbole, "takeProfit", e.target.value)}
                                                                                placeholder="ex: 2600"
                                                                                className="w-28 pl-2 pr-8 py-1.5 text-xs font-bold border border-emerald-200 rounded-lg focus:outline-none focus:border-emerald-600"
                                                                            />
                                                                            <span className="absolute right-2.5 top-2 text-[9px] text-emerald-400 font-bold">XOF</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            <div className="mt-4 pt-3 border-t border-dashed border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3 text-xs">
                                                                <div className="flex flex-wrap gap-2">
                                                                    {slFranchi && (
                                                                        <span className="bg-rose-100 text-rose-700 px-2.5 py-1 rounded-full font-bold">
                                                                            ALERTE STOP LOSS FRANCHI ! Couper la perte.
                                                                        </span>
                                                                    )}
                                                                    {tpFranchi && (
                                                                        <span className="bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full font-bold">
                                                                            ALERTE OBJECTIF ATTEINT ! Prendre les profits.
                                                                        </span>
                                                                    )}
                                                                    {!slFranchi && !tpFranchi && (
                                                                        <span className="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full font-medium">
                                                                            Position en cours d'évaluation. Aucun seuil déclenché.
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                {tgt.stopLoss > 0 && tgt.takeProfit > 0 && (
                                                                    <div className="text-slate-500 font-medium">
                                                                        Ratio gain/risque ciblé : <strong className="text-slate-800">{ratioRR} : 1</strong>
                                                                        <span className="text-[10px] text-slate-400 ml-1">(idéalement &gt; 2)</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>

                                    {/* Positions long terme */}
                                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="p-5 border-b border-slate-100">
                                            <h3 className="text-base font-bold text-slate-900 flex items-center gap-2">
                                                <i data-lucide="line-chart" className="text-emerald-600 w-5 h-5"></i> Poche Long Terme — Horizons Cibles
                                            </h3>
                                            <p className="text-xs text-slate-500">Fixez l'année cible de revente et suivez l'accumulation de richesse.</p>
                                        </div>

                                        {positions.filter(p => p.strategie === 'LT').length === 0 ? (
                                            <div className="p-8 text-center text-slate-400 text-sm">Aucune position classée en Long Terme.</div>
                                        ) : (
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left text-xs border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-50 text-slate-400 font-bold uppercase border-b border-slate-100">
                                                            <th className="px-5 py-3">Actif</th>
                                                            <th className="px-5 py-3 text-center">Parts</th>
                                                            <th className="px-5 py-3 text-right">Total Investi</th>
                                                            <th className="px-5 py-3 text-right">Valeur Actuelle</th>
                                                            <th className="px-5 py-3 text-right">Performance</th>
                                                            <th className="px-5 py-3 text-center">Horizon Cible (année)</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                                        {positions.filter(p => p.strategie === 'LT').map(pos => (
                                                            <tr key={pos.symbole} className="hover:bg-slate-50/50">
                                                                <td className="px-5 py-3 font-bold text-slate-900">{pos.symbole}</td>
                                                                <td className="px-5 py-3 text-center">{pos.quantite}</td>
                                                                <td className="px-5 py-3 text-right">{formatFCFA(pos.coutTotal)}</td>
                                                                <td className="px-5 py-3 text-right font-semibold">{formatFCFA(pos.valeurActuelle)}</td>
                                                                <td className="px-5 py-3 text-right">
                                                                    <span className={`font-bold ${pos.plusValue >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                                        {pos.plusValue >= 0 ? '+' : ''}{pos.performance.toFixed(2)}%
                                                                    </span>
                                                                    <div className="text-[10px] text-slate-400">{formatFCFA(pos.plusValue)}</div>
                                                                </td>
                                                                <td className="px-5 py-3 text-center">
                                                                    <input
                                                                        type="number"
                                                                        value={horizons[pos.symbole] || ""}
                                                                        onChange={(e) => handleUpdateHorizon(pos.symbole, e.target.value)}
                                                                        placeholder="Année"
                                                                        className="w-20 px-1.5 py-0.5 text-center text-slate-600 border border-slate-200 rounded focus:outline-none focus:border-emerald-600"
                                                                    />
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
            document.getElementById('root').innerHTML =
                '<div style="max-width:520px;margin:3rem auto;padding:1.5rem;border:1px solid #fecaca;background:#fff1f2;border-radius:12px;font-family:sans-serif;">' +
                '<h2 style="color:#be123c;margin:0 0 .75rem;">Erreur de chargement</h2>' +
                '<p style="color:#444;margin:0;">React n\'a pas pu se charger. Vérifiez votre connexion internet, puis relancez <strong>demarrer.bat</strong> et ouvrez <strong>http://localhost:8080/</strong>.</p></div>';
        } else {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 300);
        }
    </script>

    <script>
        // Service Worker uniquement via http(s) — pas en file://
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').catch(function (err) {
                    console.warn('Service Worker non enregistré :', err);
                });
            });
        }

        // Avertissement si ouverture directe du fichier HTML
        if (location.protocol === 'file:') {
            window.addEventListener('load', function () {
                setTimeout(function () {
                    if (!document.getElementById('root').children.length) return;
                    var banner = document.createElement('div');
                    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fef3c7;color:#92400e;padding:.75rem 1rem;text-align:center;font-size:13px;font-family:sans-serif;z-index:9999;border-top:1px solid #fcd34d;';
                    banner.innerHTML = 'Pour un fonctionnement optimal, lancez <strong>demarrer.bat</strong> puis ouvrez <strong>http://localhost:8080/</strong> dans Chrome.';
                    document.body.appendChild(banner);
                }, 500);
            });
        }
    </script>
</body>
</html>
