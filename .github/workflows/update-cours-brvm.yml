name: Mettre à jour les cours BRVM

on:
  schedule:
    # Lun–Ven à 19h00 UTC (après clôture BRVM, ~19h Abidjan en heure d'été)
    - cron: "0 19 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cours-brvm
  cancel-in-progress: false

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Récupérer les cours BRVM
        run: python scripts/fetch_cours.py

      - name: Commit et push si le fichier a changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cours-brvm.json
          if git diff --staged --quiet; then
            echo "Aucun changement de cours."
            exit 0
          fi
          git commit -m "chore: mise à jour automatique des cours BRVM"
          git push
